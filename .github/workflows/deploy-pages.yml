name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build static export
        run: npm run build
        env:
          PAGES_BASE_PATH: /elgamal
      # next/image does not prefix basePath onto /public asset paths, so add the
      # /elgamal prefix to public image/icon paths across the exported files.
      - name: Prefix public asset paths for sub-path hosting
        run: |
          find out -type f \( -name '*.html' -o -name '*.js' -o -name '*.txt' \) -print0 \
            | xargs -0 sed -i \
              -e 's#"/apartments/#"/elgamal/apartments/#g' \
              -e 's#"/images/#"/elgamal/images/#g' \
              -e 's#"/icon#"/elgamal/icon#g' \
              -e 's#"/apple-icon#"/elgamal/apple-icon#g' \
              -e 's#"/placeholder#"/elgamal/placeholder#g'
      - name: Disable Jekyll (serve _next folder)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
